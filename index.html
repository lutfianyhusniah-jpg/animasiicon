<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Animasi Icon</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- BARIS 1 -->

        <!-- TRUCK -->
        <div class="item truck-item">
            <img src="image/Artboard 1.svg" class="truck">
        </div>

        <!-- TANGAN + UANG + KOIN -->
        <div class="item money-item">
            <img src="image/Artboard 2.svg" class="money">
            <img src="image/7.svg" class="coin">
        </div>

        <!-- KALENDER -->
        <div class="item">
            <img src="image/Artboard 3.svg" class="calendar">
        </div>

        <!-- PESAWAT -->
        <div class="item">
            <img src="image/Artboard 4.svg" class="plane">
        </div>

        <!-- LOKASI + ICON -->
        <div class="item location-item">
            <img src="image/Artboard 5.svg" class="location">
            <img src="image/5.svg" class="loc">
        </div>


        <!-- BARIS 2 -->

        <!-- BOX + CEKLIS -->
        <div class="item box-item">
            <img src="image/Artboard 6.svg" class="box">
            <img src="image/6.svg" class="ceklis">
        </div>

        <!-- COURIER + PAKET -->
        <div class="item courier-item">
            <img src="image/Artboard 7.svg" class="courier">
            <img src="image/2.svg" class="paket">
        </div>

        <!-- GLOBE + BULAN -->
        <div class="item globe-item">
            <img src="image/Artboard 8.svg" class="globe">
            <img src="image/4.svg" class="luc">
        </div>

        <!-- KAPAL + AIR -->
        <div class="item ship-item">
            <img src="image/Artboard 9.svg" class="ship">
            <img src="image/9.svg" class="air">
        </div>

        <!-- DOKUMEN + TULISAN -->
        <div class="item document-item">
            <img src="image/Artboard 10.svg" class="document">
            <img src="image/10.svg" class="tulisan">
        </div>

    </div>


    <!-- GSAP -->
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.15.0/gsap.min.js"
        integrity="sha512-Qrpii3NEFZ02RN6ZqpTu6pS/5PEq7EzBYJLki3AKBd8IncrlAwQdZHzExYwS0+b1NM0/qfx1I1GOhqWLVosocDA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer">
    </script>

    <script src="script.js"></script>

</body>
</html>
